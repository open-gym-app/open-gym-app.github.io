name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - run: npm ci

      - run: npm run build
